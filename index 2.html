<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediFast v2 — Medicine in 10 Minutes</title>
<meta name="description" content="MediFast — Hyperlocal medicine delivery, doctor booking, lab tests in 10 minutes!"/>
<meta name="theme-color" content="#00C97F"/>
<link rel="manifest" href="../manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060D1A; color: white; font-family: 'DM Sans', sans-serif; }
  #root { min-height: 100vh; }
  .initial-loader {
    position: fixed; inset: 0;
    background: #060D1A;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .loader-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg,#00C97F,#00A566);
    border-radius: 18px;
    display: flex; align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin-bottom: 1rem;
    animation: pulse 2s ease-in-out infinite;
  }
  .loader-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem; font-weight: 800;
    margin-bottom: 0.3rem;
  }
  .loader-sub { font-size: 0.78rem; color: rgba(255,255,255,0.4); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 20px rgba(0,201,127,0.3); }
    50% { box-shadow: 0 0 50px rgba(0,201,127,0.6); }
  }
</style>
</head>
<body>
<div id="root">
  <div class="initial-loader">
    <div class="loader-icon">💊</div>
    <div class="loader-title">Medi<span style="color:#00C97F">Fast</span></div>
    <div class="loader-sub">Loading v2.0...</div>
  </div>
</div>

<script>
// HTTPS enforcement
if(location.protocol !== 'https:' && location.hostname !== 'localhost') {
  location.replace('https:' + window.location.href.substring(window.location.protocol.length));
}
</script>

<!-- React 18 via CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel for JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-type="module">
  // Import and render the main app
  import MediFastApp from './MediFastApp.jsx';

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(MediFastApp));
</script>

</body>
</html>
