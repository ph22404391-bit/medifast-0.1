<!DOCTYPE html>

<head>

<meta http-equiv="refresh" content="0; url=medifast-landing.html"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0A1628;
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }
  .logo {
    font-size: 2rem;
    font-weight: 800;
    color: white;
  }
  .logo span { color: #00C97F; }
  .loading {
    width: 40px; height: 40px;
    border: 3px solid rgba(0,201,127,0.2);
    border-top-color: #00C97F;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: rgba(255,255,255,0.5); font-size: 0.9rem; }
</style>
</head>

  <div class="logo">Medi<span>Fast</span> 💊</div>
